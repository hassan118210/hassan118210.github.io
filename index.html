<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Unavailable- Code With Hassan</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          Segoe UI,
          sans-serif;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(135deg, #0f172a, #1e3a8a, #020617);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* Glow */
      .glow {
        position: absolute;
        width: 60vw;
        height: 60vw;
        max-width: 500px;
        background: #3b82f6;
        opacity: 0.2;
        border-radius: 50%;
        filter: blur(120px);
        animation: pulse 5s infinite;
      }
      .glow2 {
        right: -10%;
        bottom: -10%;
        background: #a855f7;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
      }

      /* Container */
      .container {
        max-width: 500px;
        width: 100%;
        text-align: center;
        z-index: 2;
      }

      /* Welcome */
      #welcome {
        font-size: clamp(24px, 5vw, 42px);
      }

      /* Card */
      .card {
        display: none;
        padding: 25px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        animation: fadeUp 0.6s ease;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
        }
      }

      h1 {
        font-size: clamp(22px, 4vw, 30px);
        margin-bottom: 10px;
      }

      .sub {
        opacity: 0.8;
        margin-bottom: 15px;
        font-size: 14px;
      }

      /* Rotating msg */
      .msg {
        min-height: 30px;
        font-size: 15px;
        margin-bottom: 20px;
        opacity: 0.9;
        transition: opacity 0.4s;
      }

      /* Spinner */
      .spinner {
        margin: 20px auto;
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top: 4px solid #60a5fa;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      /* Notice */
      .notice {
        margin-top: 15px;
        padding: 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.05);
        font-size: 13px;
        opacity: 0.8;
      }

      /* Footer */
      .footer {
        margin-top: 15px;
        font-size: 12px;
        opacity: 0.5;
      }
    </style>
  </head>

  <body>
    <div class="glow"></div>
    <div class="glow glow2"></div>

    <div class="container">
      <!-- Welcome -->
      <div id="welcome">Welcome 👋</div>

      <!-- Main -->
      <div class="card" id="main">
        <h1>🚧 Service Unavailable</h1>
        <div class="sub">
          This website is currently offline for major maintenance.
        </div>

        <div class="msg" id="msg"></div>

        <div class="spinner"></div>

        <div class="notice">
          This service is undergoing significant changes and will not be
          available anytime soon.<br />
          Please check back later.
        </div>

        <div class="footer">© 2026 Hassan118210</div>
      </div>
    </div>

    <script>
      const welcome = document.getElementById("welcome");
      const main = document.getElementById("main");
      const msg = document.getElementById("msg");

      // 20+ messages
      const messages = [
        "The system is currently offline...",
        "Major updates are being applied...",
        "This process may take some time...",
        "We're rebuilding core components...",
        "Improving performance and stability...",
        "Applying critical system upgrades...",
        "Enhancing overall experience...",
        "Updating backend infrastructure...",
        "Optimizing database systems...",
        "Integrating new features...",
        "Reconfiguring system modules...",
        "Performing deep maintenance tasks...",
        "Upgrading security systems...",
        "Refining user experience...",
        "Calibrating services...",
        "Running internal checks...",
        "Synchronizing systems...",
        "Preparing future improvements...",
        "Finalizing backend operations...",
        "System is under heavy maintenance...",
      ];

      let i = 0;

      // Welcome → Main
      setTimeout(() => {
        welcome.style.display = "none";
        main.style.display = "block";
        rotate();
      }, 2000);

      // Rotate messages
      function rotate() {
        msg.style.opacity = 0;

        setTimeout(() => {
          msg.innerText = messages[i];
          msg.style.opacity = 1;

          i = (i + 1) % messages.length;

          setTimeout(rotate, 1500);
        }, 300);
      }
    </script>
  </body>
</html>
